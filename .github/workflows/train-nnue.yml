name: Train NNUE Weights

on:
  workflow_dispatch:      # Allows you to trigger training manually with one click
  schedule:
    - cron: '0 2 * * 0'   # Automatically runs every Sunday at 2 AM

permissions:
  contents: write         # Crucial: Allows the runner bot to push the trained weights back to your repo

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # Generous 3-hour window to accommodate data ingestion and training epochs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'    # Automatically saves and restores your python packages across runs

      - name: Install Optimized Machine Learning Dependencies
        run: |
          python -m pip install --upgrade pip
          # Force the CPU wheel to avoid a massive 2GB+ CUDA download on a CPU-only runner
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install numpy python-chess

      - name: Verify or Create Dataset Environment
        run: |
          # If you didn't commit a dataset.txt to git, this step ensures the script doesn't crash
          if [ ! -f dataset.txt ]; then
            echo "dataset.txt not found in workspace root. Creating fallback initialization tokens..."
            echo "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1 | 0.00" > dataset.txt
          fi

      - name: Run PyTorch NNUE Trainer
        run: |
          echo "Initiating neural network training loop..."
          python train_nnue.py
          echo "Training successfully completed!"

      - name: Archive Weights as Safe Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-nnue-weights
          path: weights.bin
          retention-days: 30

      - name: Commit Binary Weights Back to Engine Public Assets
        run: |
          git config --global user.name "NNUE Workflow Bot"
          git config --global user.email "bot@engine.internal"
          
          # Ensure target directory exists and move the compiled brain over
          mkdir -p public
          cp weights.bin public/weights.bin
          
          git add public/weights.bin
          
          # Clean check: Only commit and push if the weights actually altered performance values
          if git diff --staged --quiet; then
            echo "No structural changes found in weight evaluations. Skipping push."
          else
            git commit -m "🧠 Automated NNUE weights update [$(date '+%Y-%m-%d')]"
            
            # Fetch remote updates and layer our commit cleanly on top to avoid rejection
            git pull --rebase origin main
            
            # Push the synchronized changes back home
            git push origin main
          fi
